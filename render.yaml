services:
  - type: web
    name: foodflow
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/restaurant.db
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
